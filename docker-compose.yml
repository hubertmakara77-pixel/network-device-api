version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: network_db
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Przekazujemy link do bazy danych z loginu i hasła wyżej
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/network_db
    depends_on:
      - db